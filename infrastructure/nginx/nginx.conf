# M1 APPW SecureShop - Nginx Reverse Proxy Configuration
# INTENTIONAL MISCONFIGURATIONS: Students must identify and fix these issues

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # SECURITY ISSUE: Logging configuration doesn't mask sensitive data
    # TODO: Review and improve log format to prevent credential leakage
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # SECURITY ISSUE: Server version is exposed
    # TODO: Hide nginx version information
    # server_tokens off;

    # SECURITY ISSUE: No GZIP compression configured
    # TODO: Enable gzip compression with secure settings
    # gzip on;
    # gzip_vary on;
    # gzip_proxied any;
    # gzip_comp_level 6;
    # gzip_types text/plain text/css text/xml text/javascript
    #            application/json application/javascript application/xml+rss
    #            application/rss+xml font/truetype font/opentype
    #            application/vnd.ms-fontobject image/svg+xml;

    upstream backend_api {
        # TODO: Consider load balancing across multiple backend instances
        server backend:4000;
    }

    upstream frontend_app {
        server frontend:3000;
    }

    # HTTP server - redirects to HTTPS
    # TODO: Implement HTTPS redirect
    server {
        listen 80;
        server_name _;

        # SECURITY ISSUE: No redirect to HTTPS configured
        # In production, all traffic should be redirected to HTTPS
        # TODO: Add permanent redirect to HTTPS
        # return 301 https://$host$request_uri;

        # Health check endpoint (for monitoring)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # SECURITY ISSUE: Directory listing might be enabled
        # TODO: Ensure autoindex is off
        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTPS server configuration
    # TODO: Uncomment and configure with proper SSL certificates
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     # TODO: Add SSL certificate paths
    #     # ssl_certificate /etc/nginx/ssl/cert.pem;
    #     # ssl_certificate_key /etc/nginx/ssl/key.pem;
    #
    #     # SECURITY ISSUE: SSL/TLS configuration needs hardening
    #     # TODO: Configure strong TLS versions and cipher suites
    #     # ssl_protocols TLSv1.2 TLSv1.3;
    #     # ssl_ciphers HIGH:!aNULL:!MD5;
    #     # ssl_prefer_server_ciphers on;
    # }

    # SECURITY ISSUE: Missing security headers
    # TODO: Add these headers to all responses
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header X-Frame-Options "SAMEORIGIN" always;
    # add_header X-XSS-Protection "1; mode=block" always;
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Content-Security-Policy "default-src 'self'" always;

    # API Proxy Configuration
    # SECURITY ISSUE: No rate limiting or request validation
    # TODO: Implement rate limiting and request size limits
    server {
        listen 80;
        server_name api.* localhost;

        location / {
            # SECURITY ISSUE: CORS headers not properly configured at nginx level
            # Backend handles CORS but nginx should also validate
            # TODO: Add CORS validation

            proxy_pass http://backend_api;
            proxy_http_version 1.1;

            # SECURITY ISSUE: Sensitive headers might be proxied
            # TODO: Review which headers are forwarded
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # TODO: Add timeout configurations
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # SECURITY ISSUE: No rate limiting on login endpoint
        # TODO: Implement rate limiting specifically for auth endpoints
        location /api/auth/login {
            # Rate limiting should be configured here
            proxy_pass http://backend_api;
        }
    }

    # SECURITY ISSUE: No request body size limits on file upload endpoints
    # TODO: Configure appropriate client_max_body_size per location
}
